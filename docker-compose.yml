version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8002:8002"
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=coats.settings

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Anonymous volume for node_modules to avoid host machine conflicts
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
